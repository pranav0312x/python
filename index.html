<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: black;\n            color: white;\n            margin: 0;\n        }\n        canvas {\n            border: 1px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="pong" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const ctx = canvas.getContext('2d');\n\n        // Create the pong paddle class  \n        class Paddle {\n            constructor(x, y) {\n                this.x = x;\n                this.y = y;\n                this.width = 10;\n                this.height = 100;\n            }\n\n            draw() {\n                ctx.fillStyle = 'white';\n                ctx.fillRect(this.x, this.y, this.width, this.height);\n            }\n        }\n\n        // Create the pong ball class\n        class Ball {\n            constructor() {\n                this.x = canvas.width / 2;\n                this.y = canvas.height / 2;\n                this.size = 10;\n                this.speedX = 5;\n                this.speedY = 5;\n            }\n\n            draw() {\n                ctx.fillStyle = 'white';\n                ctx.beginPath();\n                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);\n                ctx.fill();\n            }\n            update() {\n                this.x += this.speedX;\n                this.y += this.speedY;\n                if (this.y + this.size > canvas.height || this.y - this.size < 0) {\n                    this.speedY *= -1;\n                }\n            }\n        }\n\n        // Initialize player paddles and the ball\n        const player1 = new Paddle(0, canvas.height / 2 - 50);\n        const player2 = new Paddle(canvas.width - 10, canvas.height / 2 - 50);\n        const ball = new Ball();\n\n        function gameLoop() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            player1.draw();\n            player2.draw();\n            ball.draw();\n            ball.update();\n            requestAnimationFrame(gameLoop);\n        }\n\n        // Start the game\n        gameLoop();\n    <\/script>\n</body>\n</html>
